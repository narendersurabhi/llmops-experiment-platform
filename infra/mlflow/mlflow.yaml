apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: llmops
spec:
  type: ClusterIP
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: llmops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: llmops/mlflow:dev
          imagePullPolicy: IfNotPresent
          command: ["mlflow", "server"]
          args:
            - "--host=0.0.0.0"
            - "--port=5000"
            - "--backend-store-uri=postgresql://mlflow:mlflow@postgres.llmops.svc.cluster.local:5432/mlflow"
            - "--default-artifact-root=s3://mlflow-artifacts"
          env:
            - name: AWS_ACCESS_KEY_ID
              value: minioadmin
            - name: AWS_SECRET_ACCESS_KEY
              value: minioadmin
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio.llmops.svc.cluster.local:9000
            - name: AWS_DEFAULT_REGION
              value: us-east-1
          ports:
            - containerPort: 5000
